{% extends "base.html" %}

{% block title %}{{ post.titulo }}{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div style="max-width: 800px; margin: 0 auto;">
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">{{ post.titulo }}</h1>
            <div class="post-meta" style="margin-bottom: 30px;">
                <span>{{ post.fecha_publicacion }}</span>
                {% if post.tags %}
                <span>
                    {% for tag in post.tags.split(', ') %}
                    <span class="tech-tag">{{ tag }}</span>
                    {% endfor %}
                </span>
                {% endif %}
            </div>
            <div style="font-size: 1.1rem; line-height: 1.8;">
                {{ post.contenido }}
            </div>
            <div style="margin-top: 40px;">
                <a href="/blog" class="btn btn-secondary" style="background: var(--bg-alt); color: var(--text); border: 1px solid var(--border);">← Volver al blog</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
